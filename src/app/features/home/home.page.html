<ion-header>
  <ion-toolbar color="primary">
    <ion-title>ShopEasy</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/cart">
        <ion-icon name="cart-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Search -->
  <ion-searchbar
    placeholder="Search products..."
    animated="true">
  </ion-searchbar>

  <!-- Banner -->
  <div class="banner">
    <img src="assets/banners/banner1.jpg" alt="Banner">
  </div>

  <!-- Categories -->
  <div class="section">
    <h2>Categories</h2>

    <div class="categories">
      <div class="category-card">
        <ion-icon name="phone-portrait"></ion-icon>
        <p>Mobiles</p>
      </div>

      <div class="category-card">
        <ion-icon name="laptop"></ion-icon>
        <p>Laptops</p>
      </div>

      <div class="category-card">
        <ion-icon name="watch"></ion-icon>
        <p>Watches</p>
      </div>

      <div class="category-card">
        <ion-icon name="headset"></ion-icon>
        <p>Accessories</p>
      </div>
    </div>
  </div>

  <!-- Featured Products -->
  <div class="section">
    <h2>Featured Products</h2>

    <ion-grid>
      <ion-row>

        <ion-col size="6">
          <ion-card>
            <img src="assets/images/image1.jpeg">
            <ion-card-content>
              <h3>Tabby Silk</h3>
              <p>$999</p>

              <ion-button
                expand="block"
                size="small">
                Add to Cart
              </ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card>
            <img src="assets/images/image2.jpeg">
            <ion-card-content>
              <h3>Tabby Silk</h3>
              <p>$199</p>

              <ion-button
                expand="block"
                size="small">
                Add to Cart
              </ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>

      </ion-row>
    </ion-grid>
  </div>

</ion-content>
